services:
  - type: web
    name: weassist-backend
    env: python
    runtime: python-3.11
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python -m flask --app run.py db upgrade; python -m flask --app run.py bootstrap-admin-if-enabled; python -m flask --app run.py seed-demo-data-if-enabled; gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@hostel.com
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Admin
      - key: BOOTSTRAP_ADMIN_HOSTEL
        value: A
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: 555555
      - key: BOOTSTRAP_ADMIN_ON_START
        value: true
      - key: BOOTSTRAP_ADMIN_FORCE_UPDATE
        value: true
      - key: BOOTSTRAP_ADMIN_ON_LOGIN
        value: true
      - key: SEED_DEMO_STUDENT
        value: true
      - key: DEMO_STUDENT_EMAIL
        value: student.demo@hostel.com
      - key: DEMO_STUDENT_PASSWORD
        value: demo123
      - key: DEMO_STUDENT_NAME
        value: Demo Student
      - key: DEMO_STUDENT_HOSTEL
        value: A
      - key: DEMO_STUDENT_FORCE_UPDATE
        value: false
      - key: DEMO_STUDENT_ON_LOGIN
        value: true
      - key: SEED_DEMO_DATA
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: weassist-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: true
    
databases:
  - name: weassist-db
    databaseName: weassist
    user: weassist_user
