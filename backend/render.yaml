services:
  - type: web
    name: weassist-backend
    env: python
    pythonVersion: 3.10.13
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt"
    startCommand: "gunicorn run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: weassist-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
    
databases:
  - name: weassist-db
    databaseName: weassist
    user: weassist_user
