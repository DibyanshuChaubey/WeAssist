services:
  - type: web
    name: weassist-backend
    env: python
    runtime: python-3.11
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python -m flask --app run.py init-db; gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
      - key: SEED_STUDENT_PASSWORD
        generateValue: true
      - key: SEED_FORCE_UPDATE
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: weassist-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: true
    
databases:
  - name: weassist-db
    databaseName: weassist
    user: weassist_user
